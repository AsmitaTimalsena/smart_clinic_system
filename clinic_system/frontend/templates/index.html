<html lang="en">
<head>
   <meta charset="UTF-8">
   <title>Doctors Clinic application </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="text-center my-5">
    <h1 class="display-3 fw-bold">SMART CLINIC SYSTEM</h1>
</div>
<h1>Doctors list</h1>
<table class="table table-success table-striped-columns">
    <thead>
        <tr>
            <th>Name</th>
            <th>Specialization</th>
            <th>Experience</th>
        </tr>
    </thead>
    <tbody id="doctor_list"></tbody>
</table>

<h1>Patients list</h1>
<table class="table table-success table-striped-columns">
    <thead>
        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>
    </thead>
    <tbody id="patient_list"></tbody>
</table>

<h1>Appointments list</h1>
<table class="table table-success table-striped-columns">
    <thead>
        <tr>
            <th>Doctor</th>
            <th>Patient</th>
            <th>Date</th>
            <th>Time</th>
        </tr>
    </thead>
    <tbody id="appointment_list"></tbody>
</table>

<a href="http://127.0.0.1:8000/admin/" target="_blank">admin site</a>
<a href="http://127.0.0.1:8000/doctors/" target="_blank">doctors list site</a>
<a href="http://127.0.0.1:8000/patients/" target="_blank">patients list site</a>
<script>
    const token = localStorage.getItem("token");
    // Doctors
   fetch("http://127.0.0.1:8000/doctors/")
   .then(response => response.json())
   .then(data => {
       const table = document.getElementById('doctor_list');

       data.forEach(doctor => {
           const row = document.createElement('tr');

           row.innerHTML = `
               <td>${doctor.name}</td>
               <td>${doctor.specialization}</td>
               <td>${doctor.experience}</td>
           `;

           table.appendChild(row);
       });
   })
   .catch(error => console.error("doctor error:", error));

   // Patients
   fetch("http://127.0.0.1:8000/patients/")
   .then(response => response.json())
   .then(data => {
       const table = document.getElementById('patient_list');

       data.forEach(patient => {
           const row = document.createElement('tr');

           row.innerHTML = `
               <td>${patient.name}</td>
               <td>${patient.age}</td>
           `;

           table.appendChild(row);
       });
   })
   .catch(error => console.error("patient error:", error));


   // Appointments
   fetch("http://127.0.0.1:8000/appointments/")
   .then(response => response.json())
   .then(data => {
       const table = document.getElementById('appointment_list');

       data.forEach(appointment => {
           const row = document.createElement('tr');

           row.innerHTML = `
               <td>${appointment.doctor}</td>
               <td>${appointment.patient}</td>
               <td>${appointment.date}</td>
               <td>${appointment.time}</td>
           `;

           table.appendChild(row);
       });
   })
   .catch(error => console.error("appointment error:", error));
</script>
</body>
</html>
